# This workflow packages the verified app.
# It is manual on purpose so Day 1 stays focused on CI.
name: Build Docker Image Workflow

on:
  # Students start this workflow manually from the Actions tab.
  workflow_dispatch:

env:
  # Added github.repository_owner to ensure the image goes to YOUR registry namespace.
  # GHCR requires repository owners to be lowercase.
  FLASKAPP_IMAGE_NAME: ${{ github.repository_owner }}/flask-app
  MYSQL_IMAGE_NAME: ${{ github.repository_owner }}/mysql

jobs:
  build-flask-app-package:
    runs-on: ubuntu-latest
    
    # 1. CRITICAL: Grant the token permission to push packages
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 3. Fixed typo: changed .src/ to src/ 
          context: src/flaskapp
          push: true  
          # 2. This will now resolve to ghcr.io/yourusername/flask-app:tag
          tags: ghcr.io/${{ env.FLASKAPP_IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}

  build-mysql:
    runs-on: ubuntu-latest
    
    # 1. CRITICAL: Grant permissions for this job as well
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          # 3. Fixed typo: changed .src/ to src/
          context: src/mysql
          push: true  
          tags: ghcr.io/${{ env.MYSQL_IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}

