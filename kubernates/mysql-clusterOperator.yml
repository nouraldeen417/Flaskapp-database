apiVersion: mysql.oracle.com/v2
kind: InnoDBCluster
metadata:
  name: mysql-cluster
  namespace: default
spec:
  secretName: mysql-secret 
  tlsUseSelfSigned: true
  instances: 3 
  edition: community
  podSpec:
    labels:
      app: mysql
    containers:
      - name: mysql
        image: nouraldeen152/mysql:latest
        imagePullPolicy: Always   
  datadirVolumeClaimTemplate:
    accessModes:
      - ReadWriteOnce
    storageClassName: nfs-storage
    resources:
      requests:
        storage: 5Gi







